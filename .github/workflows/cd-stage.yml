name: "CD: Stage"
run-name: ${{ github.event.workflow_run.head_commit.message }}

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    env:
      BACKEND_CORS_ORIGINS: ${{ vars.BACKEND_CORS_ORIGINS }}
      BEGET_LOGIN: ${{ secrets.BEGET_LOGIN }}
      BEGET_PASSWORD: ${{ secrets.BEGET_PASSWORD }}
      COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_HOST: ${{ vars.POSTGRES_HOST }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      RABBITMQ_HOST: ${{ vars.RABBITMQ_HOST }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      RABBITMQ_USER: ${{ vars.RABBITMQ_USER }}
      RABBITMQ_VHOST: ${{ vars.RABBITMQ_VHOST }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SERVICE_DESCRIPTION: ${{ vars.SERVICE_DESCRIPTION }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Stop previous stack
        run: docker compose -f docker-compose.yml -f docker-compose.stage.yml down || true

      - name: Deploy stack
        run: docker compose -f docker-compose.yml -f docker-compose.stage.yml up -d --build --wait

      - name: Run database migrations
        run: docker compose -f docker-compose.yml -f docker-compose.stage.yml exec -T api alembic upgrade head

      - name: Run k6 stress tests
        uses: grafana/k6-action@v0.3.1
        with:
          filename: |
            loadtests/unit/verifications.stress.js
        env:
          LOADTEST_TARGET_URL: ${{ vars.LOADTEST_TARGET_URL }}
