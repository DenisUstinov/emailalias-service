services:
  api:
    build:
      target: development
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./tests:/app/tests
      - uv-cache:/root/.cache/uv
    env_file:
      - .env

  worker:
    build:
      target: development
    command: ["celery", "-A", "app.infrastructure.celery.app", "worker", "--loglevel=info", "--pool=solo"]
    volumes:
      - ./app:/app/app
    env_file:
      - .env

  postgres:
    healthcheck:
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s

  redis:
    healthcheck:
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  rabbitmq:
    ports:
      - "15672:15672"
    healthcheck:
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  uv-cache:
